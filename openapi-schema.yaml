components:
  schemas:
    AcapsSeasonalCalender:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        modified_at:
          type: string
          format: date-time
          readOnly: true
        month:
          type: array
          items:
            type: string
            maxLength: 100
        event:
          type: array
          items:
            type: string
            maxLength: 100
        event_type:
          type: array
          items:
            type: string
            maxLength: 100
        label:
          type: array
          items:
            type: string
            maxLength: 100
        source:
          type: string
          nullable: true
          maxLength: 255
        source_date:
          type: string
          format: date
          nullable: true
        overview:
          type: integer
          title: Country overview
      required:
      - id
      - modified_at
      - overview
    Action:
      type: object
      description: Custom ModelSerializer with translaion logic (Also works for normal
        models)
      properties:
        id:
          type: integer
          readOnly: true
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/ApiActionOrgEnumKey'
        field_report_types:
          type: array
          items:
            $ref: '#/components/schemas/ApiActionTypeEnumKey'
        category:
          $ref: '#/components/schemas/ApiActionCategoryEnumKey'
        name:
          type: string
          nullable: true
          title: Name [en]
          maxLength: 400
        tooltip_text:
          type: string
          nullable: true
          title: Tooltip text [en]
        translation_module_original_language:
          allOf:
          - $ref: '#/components/schemas/TranslationModuleOriginalLanguageEnum'
          readOnly: true
      required:
      - id
      - translation_module_original_language
    ActionEnum:
      enum:
      - set
      - delete
      type: string
      description: |-
        * `set` - Set
        * `delete` - Delete
    ActionsTaken:
      type: object
      description: Custom ModelSerializer with translaion logic (Also works for normal
        models)
      properties:
        organization:
          $ref: '#/components/schemas/ApiActionOrgEnumKey'
        actions:
          type: array
          items:
            type: integer
        actions_details:
          type: array
          items:
            $ref: '#/components/schemas/Action'
          readOnly: true
        id:
          type: integer
          readOnly: true
        summary:
          type: string
          nullable: true
          title: Summary [en]
        translation_module_original_language:
          allOf:
          - $ref: '#/components/schemas/TranslationModuleOriginalLanguageEnum'
          readOnly: true
      required:
      - actions_details
      - id
      - organization
      - translation_module_original_language
    AddDrefUser:
      type: object
      properties:
        users:
          type: array
          items:
            type: integer
          writeOnly: true
        dref:
          type: integer
          writeOnly: true
      required:
      - dref
      - users
    Admin2:
      type: object
      description: |-
        A mixin class to encapsulate common methods
        used across serializers that deal with geo objects.
        Will allow us to avoid repeating code to convert objects
        to GeoJSON, etc.

        FIXME: use this base class for existing serializers using geo objects.
        FIXME: the methods can probably be thought through a bit better
      properties:
        id:
          type: integer
          readOnly: true
        district_id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 64
        bbox:
          type: object
          additionalProperties: {}
          readOnly: true
        centroid:
          type: object
          additionalProperties: {}
          readOnly: true
        is_deprecated:
          type: boolean
          description: Is this a deprecated area?
      required:
      - bbox
      - centroid
      - code
      - district_id
      - id
      - name
    Affiliation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: integer
          maximum: 99
          minimum: 0
        name:
          type: string
          maxLength: 100
      required:
      - code
      - id
      - name
    AggregateByDtype:
      type: object
      properties:
        dtype:
          type: integer
        count:
          type: integer
      required:
      - count
      - dtype
    AggregateByTimeSeries:
      type: object
      properties:
        timespan:
          type: string
          format: date-time
        count:
          type: integer
        beneficiaries:
          type: integer
          nullable: true
        amount_funded:
          type: number
          format: double
          nullable: true
      required:
      - amount_funded
      - beneficiaries
      - count
      - timespan
    AggregateDeployments:
      type: object
      properties:
        active_deployments:
          type: integer
        active_erus:
          type: integer
        deployments_this_year:
          type: integer
    AggregateHeaderFigures:
      type: object
      properties:
        active_drefs:
          type: integer
        active_appeals:
          type: integer
        total_appeals:
          type: integer
        target_population:
          type: integer
        amount_requested:
          type: integer
        amount_requested_dref_included:
          type: integer
        amount_funded:
          type: integer
        amount_funded_dref_included:
          type: integer
      required:
      - active_appeals
      - active_drefs
      - amount_funded
      - amount_funded_dref_included
      - amount_requested
      - amount_requested_dref_included
      - target_population
      - total_appeals
