        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: type_of_dref
        schema:
          type: array
          items:
            type: integer
            nullable: true
            title: Dref type
            enum:
            - 0
            - 1
            - 2
            - 3
        description: |-
          * `0` - Imminent
          * `1` - Assessment
          * `2` - Response
          * `3` - Loan
        explode: true
        style: form
